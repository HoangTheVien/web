<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dream Team</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #120000;
        color: white;
    }
    .header {
        padding: 20px 20px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .logo {
        font-size: 28px;
        font-weight: bold;
        color: orange;
    }
    .menu a {
        color: #ccc;
        margin-left: 20px;
        text-decoration: none;
    }
    .menu a:hover {
        color: white;
    }
    hr{
        border: 0.5px solid #ff3b3b;
    }
    .tv{
        text-align: center;
        font-size: 30px;    
        font-weight: bold;
        color: gold;
    }
    .container {
        display: flex;
        justify-content: center;
        gap: 40px;
        margin-top: 60px;
        flex-wrap: wrap;
    }
    .card {
        width: 350px;
        height: 250px;
        border: 2px solid #ff3b3b;
        border-radius: 15px;
        padding: 20px;
        text-align: center;
        background: #111;
        box-shadow: 0 0 15px rgba(255,0,0,0.2);
    }
    .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid gold;
        margin-bottom: 10px;
    }
    .name{
        font-size: 18px;
        font-weight: bold;
        color: gold;
    }
    .name2{
        font-size: 14px;
        color: #bbb;
        margin-top: 5px;
    }


</style>

</head>

<body>

<div class="header">
    <div class="logo">NHÓM 2 <br>
        <p style="font-size: 20px;">Chủ đề: Thiết kế trang Web tính tiền điện, nước</p></div>
    <div class="menu">
        <a href="thietkeweb.html">Trang chủ</a>
    </div>
</div>
<hr>
<p class="tv">Thành viên của nhóm</p>

<div class="container">
    <div class="card">
        <img src="./assets/tuna11.jpg" class="avatar">
        <div class="name">Hoàng Thế Viên</div>
        <div class="name2">Team Member</div>
    </div>

    <div class="card">
        <img src="./assets/tuna2.jpg" class="avatar">
        <div class="name">Nguyễn Hương Anh</div>
        <div class="name2">Team Member</div>
    </div>

</div>

</body>
</html>
